<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ============================ DATA DATABASE ============================
        const KISI_KISI_DATA = [

            { no: 5, materi: "Bagian Mikroskop", indikator: "Siswa dapat mengidentifikasi bagian optik dan mekanik pada mikroskop beserta fungsinya.", level: "C2 (Memahami)", bentuk: "Pilihan Ganda Kompleks & Menjodohkan" },

        const QUIZ_QUESTIONS = [

                answer: "Robert Hooke",
                hint: "Pilihlah satu jawaban yang paling tepat. Langsung klik atau ketuk pada area salah satu pilihan (A, B, C, atau D) di bawah ini."
            },
            {
                id: 2,
                type: "pilihan-ganda",
                question: "Manakah di bawah ini yang merupakan contoh organisme uniseluler?",
                options: ["Amoeba dan Bakteri", "Jamur Kuping dan Lumut", "Cacing Tanah dan Paramecium", "Semut dan Ganggang Hijau"],

            },
            {
                id: 3,

                options: ["Benar", "Salah"],

                options: ["Benar", "Salah"],

            },

            },
            {
                id: 9,
                type: "multi-select",
                question: "Pilihlah bagian-bagian mikroskop yang tergolong ke dalam Bagian Optik (berkaitan langsung dengan jalannya cahaya dan perbesaran bayangan):",
                options: ["Lensa Okuler", "Lensa Objektif", "Cermin / Lampu Sumber Cahaya", "Makrometer (Pemutar Kasar)"],

                hint: "Berikan tanda centang pada opsi yang termasuk komponen optik mikroskop."
            },
            {

                answer: ["Sel tumbuhan memiliki bentuk yang tetap karena mempunyai dinding sel", "Sel hewan memiliki sentriol yang membantu proses pembelahan sel"],
                hint: "Pilih semua karakteristik perbedaan struktur sel yang bernilai benar."
            },
            {
                id: 11,
                type: "matching",
                question: "Jodohkanlah organel-organel sel berikut dengan fungsinya secara tepat!",
                pairs: [
                    { key: "Nukleus", options: ["Mengatur keluar masuknya zat", "Menyimpan cadangan makanan", "Pusat pengendali seluruh metabolisme dan pembawa informasi genik"], correct: "Pusat pengendali seluruh metabolisme dan pembawa informasi genik" },
                    { key: "Vakuola Tumbuhan", options: ["Mengatur keluar masuknya zat", "Menyimpan cadangan makanan", "Pusat pengendali seluruh metabolisme dan pembawa informasi genik"], correct: "Menyimpan cadangan makanan" },
                    { key: "Membran Sel", options: ["Mengatur keluar masuknya zat", "Menyimpan cadangan makanan", "Pusat pengendali seluruh metabolisme dan pembawa informasi genik"], correct: "Mengatur keluar masuknya zat" }
                ],
                hint: "Jodohkan setiap butir di kolom kiri dengan jawaban pasangannya di kolom kanan melalui menu dropdown."
            },
            {
                id: 12,
                type: "matching",
                question: "Pasangkan bagian mekanis mikroskop berikut ini dengan fungsinya yang paling tepat!",
                pairs: [
                    { key: "Makrometer (Pemutar kasar)", options: ["Tempat menaruh objek/sediaan yang akan diamati", "Mengganti atau memilih tingkat perbesaran lensa objektif", "Naik-turunkan tabung mikroskop secara cepat untuk mencari fokus awal"], correct: "Naik-turnkan tabung mikroskop secara cepat untuk mencari fokus awal" },
                    { key: "Revolver", options: ["Tempat menaruh objek/sediaan yang akan diamati", "Mengganti atau memilih tingkat perbesaran lensa objektif", "Naik-turunkan tabung mikroskop secara cepat untuk mencari fokus awal"], correct: "Mengganti atau memilih tingkat perbesaran lensa objektif" },
                    { key: "Meja Preparat", options: ["Tempat menaruh objek/sediaan yang akan diamati", "Mengganti atau memilih tingkat perbesaran lensa objektif", "Naik-turunkan tabung mikroskop secara cepat untuk mencari fokus awal"], correct: "Tempat menaruh objek/sediaan yang akan diamati" }
                ],
                hint: "Suaikan bagian komponen mekanik dengan peruntukannya masing-masing."
            },
            {
                id: 13,
                type: "pilihan-ganda",
                question: "Mengapa sel tumbuhan cenderung memiliki bentuk yang tetap dan kaku bila dibandingkan dengan sel hewan?",
                options: ["Karena sel tumbuhan memiliki dinding sel yang tersusun atas selulosa", "Karena sel tumbuhan memiliki kloroplas untuk fotosintesis", "Karena sel tumbuhan tidak mempunyai nukleus", "Karena vakuola sel tumbuhan berukuran sangat kecil"],
                answer: "Karena sel tumbuhan memiliki dinding sel yang tersusun atas selulosa",
                hint: "Pikirkan organel pelindung terluar yang membedakan sel tumbuhan dari sel hewan."
            },
            {
                id: 14,
                type: "benar-salah",
                question: "Pernyataan: Robert Hooke mengamati sel hidup yang sedang aktif membelah diri ketika ia melihat sayatan gabus pohon ek di bawah mikroskop.",
                options: ["Benar", "Salah"],
                answer: "Salah",
                hint: "Ingat kembali fakta sejarah sel gabus, apakah itu struktur sel hidup atau ruangan sel mati kaku."
            },
            {
                id: 15,
                type: "matching",
                question: "Jodohkan ilmuwan-ilmuwan hebat berikut dengan kontribusinya bagi dunia mikroskopi!",
                pairs: [
                    { key: "Zacharias Janssen", options: ["Menemukan sel pertama kali dari sayatan gabus", "Ilmuwan pertama yang melihat mikroorganisme hidup di air hujan", "Diakui sebagai penemu mikroskop pertama pada tahun 1590"], correct: "Diakui sebagai penemu mikroskop pertama pada tahun 1590" },
                    { key: "Antonie van Leeuwenhoek", options: ["Menemukan sel pertama kali dari sayatan gabus", "Ilmuwan pertama yang melihat mikroorganisme hidup di air hujan", "Diakui sebagai penemu mikroskop pertama pada tahun 1590"], correct: "Ilmuwan pertama yang melihat mikroorganisme hidup di air hujan" },
                    { key: "Robert Hooke", options: ["Menemukan sel pertama kali dari sayatan gabus", "Ilmuwan pertama yang melihat mikroorganisme hidup di air hujan", "Diakui sebagai penemu mikroskop pertama pada tahun 1590"], correct: "Menemukan sel pertama kali dari sayatan gabus" }
                ],
                hint: "Hubungkan nama tokoh pionir biologi sel dengan temuan legendarisnya."
            }
        ];

        // ============================ UTAMA UTAMA UTAMA ============================
        function App() {
            const [activeTab, setActiveTab] = useState("materi"); // materi, kisikisi, kuis, tanyaai
            const [subMateri, setSubMateri] = useState("pengenalan-sel"); // pengenalan-sel, alat-mikroskop, perbandingan-sel
            
            // State Kuis Interaktif
            const [quizStarted, setQuizStarted] = useState(false);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [selectedAnswers, setSelectedAnswers] = useState({}); // format: { qId: answerData }
            const [quizSubmitted, setQuizSubmitted] = useState(false);
            const [score, setScore] = useState(0);

            // State Tanya Guru AI
            const [messages, setMessages] = useState([
                { id: 1, sender: "bot", text: "Halo! Saya adalah Asisten Guru Pro IPA AI. Silakan tanyakan apa saja tentang materi Bab 1 Kelas 8: Pengenalan Sel dan Mikroskop! Contoh: 'Apa bedanya sel hewan dan tumbuhan?' atau 'Bagaimana cara merawat lensa mikroskop?'" }
            ]);
            const [inputChat, setInputChat] = useState("");

            const startQuiz = () => {
                setQuizStarted(true);
                setCurrentQuestionIndex(0);
                setSelectedAnswers({});
                setQuizSubmitted(false);
                setScore(0);
            };

            const handleAnswerSelect = (qId, type, data) => {
                if (quizSubmitted) return;
                
                if (type === "multi-select") {
                    const currentAnswers = selectedAnswers[qId] || [];
                    if (currentAnswers.includes(data)) {
                        setSelectedAnswers({ ...selectedAnswers, [qId]: currentAnswers.filter(item => item !== data) });
                    } else {
                        setSelectedAnswers({ ...selectedAnswers, [qId]: [...currentAnswers, data] });
                    }
                } else if (type === "matching") {
                    const currentMatching = selectedAnswers[qId] || {};
                    setSelectedAnswers({
                        ...selectedAnswers,
                        [qId]: { ...currentMatching, [data.pairKey]: data.value }
                    });
                } else {
                    setSelectedAnswers({ ...selectedAnswers, [qId]: data });
                }
            };

            const submitQuiz = () => {
                let totalScore = 0;
                QUIZ_QUESTIONS.forEach((q) => {
                    const userAnswer = selectedAnswers[q.id];
                    if (!userAnswer) return;

                    if (q.type === "pilihan-ganda" || q.type === "benar-salah") {
                        if (userAnswer === q.answer) totalScore += 1;
                    } else if (q.type === "multi-select") {
                        const isMatch = q.answer.length === userAnswer.length && q.answer.every(v => userAnswer.includes(v));
                        if (isMatch) totalScore += 1;
                    } else if (q.type === "matching") {
                        let allCorrect = true;
                        q.pairs.forEach(p => {
                            if (userAnswer[p.key] !== p.correct) allCorrect = false;
                        });
                        if (allCorrect) totalScore += 1;
                    }
                });

                const finalScore = Math.round((totalScore / QUIZ_QUESTIONS.length) * 100);
                setScore(finalScore);
                setQuizSubmitted(true);
            };

            const handleSendChat = (e) => {
                e.preventDefault();
                if (!inputChat.trim()) return;

                const userMessage = { id: Date.now(), sender: "user", text: inputChat };
                setMessages(prev => [...prev, userMessage]);
                setInputChat("");

                // Simulasi Pintar Jawaban Bot Guru AI
                setTimeout(() => {
                    let replyText = "Pertanyaan yang sangat bagus! Terkait hal tersebut, materi Bab 1 menjelaskan bahwa kesatuan terkecil kehidupan dinamakan sel. Struktur tersebut dilindungi membran dan diatur intinya.";
                    const lowerText = inputChat.toLowerCase();
                    
                    if (lowerText.includes("hewan") || lowerText.includes("tumbuhan") || lowerText.includes("beda")) {
                        replyText = "Perbedaan mencoloknya adalah Sel Tumbuhan memiliki Dinding Sel (kaku dari selulosa) dan Kloroplas (tempat fotosintesis), sedangkan Sel Hewan tidak punya dinding sel tetapi memiliki Sentriol untuk pembelahan.";
                    } else if (lowerText.includes("mikroskop") || lowerText.includes("lensa")) {
                        replyText = "Bagian Mikroskop terbagi dua: Optik (Lensa okuler, objektif, cermin) dan Mekanik (revolver, makrometer, mikrometer, meja). Bersihkan lensa hanya dengan kertas lensa khusus agar tidak tergores!";
                    } else if (lowerText.includes("penemu") || lowerText.includes("sejarah")) {
                        replyText = "Istilah sel pertama kali dicetuskan oleh Robert Hooke pada tahun 1665 saat meneliti sayatan tipis gabus pohon ek kering bawah mikroskop sederhananya.";
                    }

                    setMessages(prev => [...prev, { id: Date.now() + 1, sender: "bot", text: replyText }]);
                }, 1000);
            };

            return (
                <div class="max-w-6xl mx-auto px-4 py-6">
                    {/* APP HEADER */}
                    <header class="flex flex-col md:flex-row md:items-center md:justify-between bg-emerald-700 text-white p-5 rounded-2xl shadow-md mb-6">
                        <div class="flex items-center space-x-4">
                            <div class="bg-white/20 p-3 rounded-xl">
                                <i class="fa-solid fa-dna text-3xl text-emerald-100"></i>
                            </div>
                            <div>
                                <h1 class="text-2xl font-extrabold tracking-tight">EduSel Kelas 8</h1>
                                <p class="text-xs text-emerald-100/90 font-medium mt-0.5">Aplikasi Belajar Sel & Mikroskop Mandiri Interaktif • Kurikulum Merdeka</p>
                            </div>
                        </div>
                        
                        {/* NAVBAR UTAMA (4 TAB SINKRON) */}
                        <nav class="flex flex-wrap gap-2 mt-4 md:mt-0 bg-emerald-800/60 p-1.5 rounded-xl border border-emerald-600/30">
                            <button onClick={() => setActiveTab("materi")} class={`px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 ${activeTab === 'materi' ? 'bg-white text-emerald-800 shadow-sm' : 'text-white hover:bg-emerald-600/40'}`}>
                                <i class="fa-solid fa-book-open mr-2"></i>Materi
                            </button>
                            <button onClick={() => setActiveTab("kisikisi")} class={`px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 ${activeTab === 'kisikisi' ? 'bg-white text-emerald-800 shadow-sm' : 'text-white hover:bg-emerald-600/40'}`}>
                                <i class="fa-solid fa-table-list mr-2"></i>Kisi-Kisi
                            </button>
                            <button onClick={() => setActiveTab("kuis")} class={`px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 ${activeTab === 'kuis' ? 'bg-white text-emerald-800 shadow-sm' : 'text-white hover:bg-emerald-600/40'}`}>
                                <i class="fa-solid fa-vial-circle-check mr-2"></i>Kuis Interaktif
                            </button>
                            <button onClick={() => setActiveTab("tanyaai")} class={`px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 ${activeTab === 'tanyaai' ? 'bg-white text-emerald-800 shadow-sm' : 'text-white hover:bg-emerald-600/40'}`}>
                                <i class="fa-solid fa-robot mr-2"></i>Tanya Guru AI
                            </button>
                        </nav>
                    </header>

                    {/* ============================ KONTEN TAB: MATERI ============================ */}
                    {activeTab === "materi" && (
                        <div class="space-y-6">
                            {/* Sub Navigasi Konten Materi */}
                            <div class="bg-white p-4 rounded-xl shadow-sm flex flex-wrap gap-3 items-center border border-slate-200">
                                <span class="text-xs font-bold uppercase tracking-wider text-slate-400 mr-2">Materi Pembelajaran Bab 1:</span>
                                <button onClick={() => setSubMateri("pengenalan-sel")} class={`flex items-center space-x-2 px-4 py-2 rounded-xl text-xs font-bold border transition-all ${subMateri === 'pengenalan-sel' ? 'bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                    <i class="fa-solid fa-circle-dot"></i> <span>Pengenalan Sel</span>
                                </button>
                                <button onClick={() => setSubMateri("alat-mikroskop")} class={`flex items-center space-x-2 px-4 py-2 rounded-xl text-xs font-bold border transition-all ${subMateri === 'alat-mikroskop' ? 'bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                    <i class="fa-solid fa-microscope"></i> <span>Alat Mikroskop</span>
                                </button>
                                <button onClick={() => setSubMateri("perbandingan-sel")} class={`flex items-center space-x-2 px-4 py-2 rounded-xl text-xs font-bold border transition-all ${subMateri === 'perbandingan-sel' ? 'bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                    <i class="fa-solid fa-scale-balanced"></i> <span>Perbandingan Sel</span>
                                </button>
                            </div>

                            {/* Sub Materi Konten 1: Pengenalan Sel */}
                            {subMateri === "pengenalan-sel" && (
                                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                                    <div>
                                        <span class="bg-amber-100 text-amber-800 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Materi Utama</span>
                                        <h2 class="text-xl font-bold mt-2">Pengenalan Sel</h2>
                                        <p class="text-xs text-slate-500 mt-0.5">Unit Terkecil Kehidupan</p>
                                    </div>
                                    <hr class="border-slate-100"/>
                                    <div class="space-y-4 text-sm leading-relaxed text-slate-600">
                                        <h3 class="font-bold text-slate-900 flex items-center"><span class="bg-emerald-100 text-emerald-700 w-5 h-5 inline-flex items-center justify-center rounded-full text-xs mr-2">1</span> Apa itu Sel?</h3>
                                        <p>Sel adalah unit struktural dan fungsional terkecil dari makhluk hidup. Istilah sel pertama kali ditemukan oleh Robert Hooke pada tahun 1665 saat mengamati sayatan gabus pohon ek di bawah mikroskop sederhana. Teori sel modern menyatakan bahwa semua makhluk hidup terdiri dari satu atau lebih sel, dan semua sel berasal dari sel yang sudah ada sebelumnya.</p>
                                        
                                        <h3 class="font-bold text-slate-900 flex items-center pt-2"><span class="bg-emerald-100 text-emerald-700 w-5 h-5 inline-flex items-center justify-center rounded-full text-xs mr-2">2</span> Spesialisasi Sel (Uniseluler vs Multiseluler)</h3>
                                        <ul class="list-disc list-inside space-y-1 pl-2">
                                            <li><strong class="text-slate-800">Uniseluler:</strong> Organisme yang hanya terdiri dari satu sel tunggal (Contoh: Bakteri, Amoeba, Paramecium).</li>
                                            <li><strong class="text-slate-800">Multiseluler:</strong> Organisme yang terdiri dari banyak sel yang bekerja sama (Contoh: Manusia, Hewan, Tumbuhan). Pada organisme multiseluler, terjadi spesialisasi sel di mana sel memiliki bentuk dan fungsi yang berbeda-beda.</li>
                                        </ul>

                                        <h3 class="font-bold text-slate-900 flex items-center pt-2"><span class="bg-emerald-100 text-emerald-700 w-5 h-5 inline-flex items-center justify-center rounded-full text-xs mr-2">3</span> Organel Sel (Bagian di dalam Sel)</h3>
                                        <p>Organel adalah struktur khusus di dalam sel yang menjalankan fungsi spesifik:</p>
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-2">

                                        <p>Mikroskop adalah alat bantu utama untuk mengamati objek-objek berukuran sangat kecil (mikroskopis) seperti sel bakteri, jaringan tumbuhan, maupun protozoa yang tidak kasat mata. Penemu mikroskop pertama yang diakui secara luas adalah Zacharias Janssen pada tahun 1590, diikuti oleh penyempurnaan oleh Antony van Leeuwenhoek.</p>

                                        <h3 class="font-bold text-slate-900 pt-2">2. Bagian-Bagian Mikroskop</h3>
                                        <p>Secara umum, mikroskop memiliki dua bagian utama:</p>

                                            <div><strong class="text-slate-800">• Bagian Optik (Berhubungan dengan cahaya & lensa):</strong> Lensa Okuler (dekat mata pengamat), Lensa Objektif (dekat objek/preparat), Kondensor (mengumpulkan cahaya), Diafragma (mengatur intensitas cahaya), dan Cermin/Lampu sumber cahaya.</div>
                                            <div><strong class="text-slate-800">• Bagian Mekanik (Berhubungan dengan penyangga & gerakan):</strong> Makrometer (pemutar kasar untuk fokus cepat), Mikrometer (pemutar halus untuk fokus detail), Revolver (pemilih perbesaran lensa objektif), Meja Preparat, dan Penjepit Objek.</div>
                                        </div>

                                            <li>Letakkan mikroskop di meja yang rata dengan memegang lengan dan menyangga kaki mikroskop.</li>
                                            <li>Putar revolver untuk memilih lensa objektif perbesaran terendah.</li>
                                            <li>Atur cermin dan diafragma agar cahaya masuk secara maksimal (lapang pandang terlihat terang).</li>
                                            <li>Letakkan preparat di meja, jepit agar stabil.</li>
                                            <li>Putar makrometer untuk mendekatkan lensa objektif ke preparat sambil melihat dari samping.</li>
                                            <li>Intip melalui lensa okuler, lalu putar makrometer ke atas secara perlahan hingga objek terlihat.</li>
                                            <li>Putar mikrometer untuk memfokuskan objek agar gambar terlihat tajam.</li>
                                        </ol>

                                        <p>• Bersihkan lensa hanya dengan tissue lensa khusus, jangan pernah pakai baju/kertas kasar agar lensa tidak tergores.</p>
                                        <p>• Saat menurunkan makrometer secara cepat, selalu perhatikan dari samping, jangan sampai lensa objektif menabrak kaca sediaan (bisa pecah!).</p>
                                    </div>
                                </div>

                                                    onClick={submitQuiz}
                                                    class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow transition-all"
                                                >
                                                    Kirim Semua Jawaban
                                                </button>
                                            ) : (
                                                <button 
                                                    onClick={startQuiz}
                                                    class="px-5 py-2 bg-slate-700 hover:bg-slate-800 text-white font-bold rounded-lg shadow transition-all"
                                                >
                                                    Ulangi Kuis
                                                </button>
                                            )
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* ============================ KONTEN TAB: TANYA GURU AI ============================ */}
                    {activeTab === "tanyaai" && (
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[520px]">
                            <div>
                                <span class="bg-teal-100 text-teal-800 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Fitur Interaktif Gemini AI</span>
                                <h2 class="text-xl font-bold mt-2">Tanya Guru IPA AI</h2>
                                <p class="text-xs text-slate-500 mt-0.5">Ada materi sel atau mikroskop kelas 8 yang masih kamu bingungkan? Tanyakan langsung ke asisten cerdas AI di bawah ini!</p>
                            </div>
                            <hr class="border-slate-100 my-4"/>

                            {/* CHAT AREA WINDOW */}
                            <div class="flex-1 overflow-y-auto space-y-4 pr-1 custom-scrollbar text-xs">
                                {messages.map((msg) => (
                                    <div key={msg.id} class={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div class={`max-w-lg p-3.5 rounded-2xl leading-relaxed ${msg.sender === 'user' ? 'bg-emerald-600 text-white rounded-tr-none' : 'bg-slate-100 text-slate-800 rounded-tl-none border border-slate-200'}`}>
                                            {msg.sender === 'bot' && (
                                                <div class="flex items-center space-x-1.5 text-slate-400 font-bold mb-1 text-[10px]">
                                                    <i class="fa-solid fa-robot text-teal-600"></i>
                                                    <span class="text-teal-700">Ibu Guru IPA Cerdas</span>
                                                    <span class="text-[9px] bg-teal-50 text-teal-600 px-1 py-0.2 rounded font-normal">• Aktif menjawab materi Bab 1</span>
                                                </div>
                                            )}
                                            <p>{msg.text}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* CHAT INPUT SUBMIT */}
                            <form onSubmit={handleSendChat} class="mt-4 flex items-center space-x-2 pt-3 border-t border-slate-100">
                                <input 
                                    type="text" 
                                    value={inputChat}
                                    onChange={(e) => setInputChat(e.target.value)}
                                    placeholder="Ketik pertanyaanmu di sini... (contoh: Apa fungsi klorofil?)"
                                    class="flex-1 text-xs p-3 rounded-xl border border-slate-200 bg-slate-50 placeholder-slate-400 font-medium focus:outline-none focus:bg-white focus:border-emerald-500"
                                />
                                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-5 py-3 rounded-xl transition-all shadow-sm">
                                    Kirim <i class="fa-solid fa-paper-plane ml-1.5"></i>
                                </button>
                            </form>
                        </div>
                    )}

                    {/* APP FOOTER */}
                    <footer class="text-center text-slate-400 text-[11px] mt-8 py-4 border-t border-slate-200/60">
                        EduSel IPA Kelas 8 SMP Bab 1 - Pengenalan Sel dan Mikroskop<br/>
                        <span class="font-semibold text-slate-500 mt-1 inline-block">© 2026 Aplikasi Pembelajaran Mandiri Interaktif. Selamat Belajar!</span>
                    </footer>
                </div>
            );
        }

        const root = RoyalDOM = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
