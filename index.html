<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSel Kelas 8 SMP - Aplikasi Belajar Sel & Mikroskop</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ==========================================
        // 1. DATA DATABASE KISI-KISI (LENGKAP 6 INDIKATOR)
        // ==========================================
        const KISI_KISI_DATA = [
            { no: 1, topik: "Pengenalan Sel", indikator: "Siswa dapat menjelaskan pengertian sel dan mengidentifikasi penemu sel pertama kali.", level: "C1 (Mengingat)", tipe: "Pilihan Ganda & Menjodohkan" },
            { no: 2, topik: "Uniseluler & Multiseluler", indikator: "Siswa dapat membedakan ciri-ciri organisme uniseluler dan multiseluler beserta contohnya.", level: "C2 (Memahami)", tipe: "Pilihan Ganda & Pilihan Ganda Kompleks" },
            { no: 3, topik: "Organel Sel", indikator: "Siswa dapat mencocokkan nama organel sel dengan fungsi spesifiknya di dalam sel.", level: "C3 (Menerapkan)", tipe: "Menjodohkan & Benar/Salah" },
            { no: 4, topik: "Perbedaan Sel", indikator: "Siswa dapat menganalisis perbedaan struktur sel tumbuhan dan sel hewan berdasarkan keberadaan organel tertentu.", level: "C4 (Menganalisis)", tipe: "Benar/Salah & Pilihan Ganda Kompleks" },
            { no: 5, topik: "Bagian Mikroskop", indikator: "Siswa dapat mengidentifikasi bagian optik dan mekanik pada mikroskop beserta fungsinya.", level: "C2 (Memahami)", tipe: "Pilihan Ganda Kompleks & Menjodohkan" },
            { no: 6, topik: "Langkah Kerja Mikroskop", indikator: "Siswa dapat mengurutkan langkah-langkah penggunaan mikroskop secara runut dan aman.", level: "C3 (Menerapkan)", tipe: "Benar/Salah & Pilihan Ganda" }
        ];

        // ==========================================
        // 2. DATA DATABASE MATERI PEMBELAJARAN (LENGKAP)
        // ==========================================
        const MATERI_DATA = {
            sel: [
                { title: "1. Apa itu Sel?", content: "Sel adalah unit struktural dan fungsional terkecil dari makhluk hidup. Istilah sel pertama kali ditemukan oleh Robert Hooke pada tahun 1665 saat mengamati sayatan gabus pohon ek di bawah mikroskop sederhana. Teori sel modern menyatakan bahwa semua makhluk hidup terdiri dari satu atau lebih sel, dan semua sel berasal dari sel yang sudah ada sebelumnya." },
                { title: "2. Spesialisasi Sel (Uniseluler vs Multiseluler)", content: "Makhluk hidup dapat dibagi berdasarkan jumlah sel penyusunnya:\n• Uniseluler: Organisme yang hanya terdiri dari satu sel tunggal (Contoh: Bakteri, Amoeba, Paramecium).\n• Multiseluler: Organisme yang terdiri dari banyak sel yang bekerja sama (Contoh: Manusia, Hewan, Tumbuhan). Pada organisme multiseluler, terjadi spesialisasi sel di mana sel memiliki bentuk dan fungsi yang berbeda-beda." },
                { title: "3. Organel Sel (Bagian di dalam Sel)", content: "Organel adalah struktur khusus di dalam sel yang menjalankan fungsi spesifik:\n• Nukleus (Inti Sel): Pusat kendali sel, menyimpan informasi genetik (DNA).\n• Membran Sel: Pelindung terluar yang mengatur keluar masuknya zat.\n• Sitoplasma: Cairan tempat berlangsungnya reaksi kimia sel.\n• Mitokondria: Tempat penghasil energi (respirasi sel).\n• Vakuola: Tempat penyimpanan air dan makanan.\n• Kloroplas: Hanya pada tumbuhan, tempat fotosintesis.\n• Dinding Sel: Hanya pada tumbuhan, memberi bentuk kaku dan perlindungan ekstra." }
            ],
            mikroskop: [
                { title: "1. Mengenal Mikroskop", content: "Mikroskop adalah alat bantu utama untuk mengamati objek-objek berukuran sangat kecil (mikroskopis) yang tidak dapat dilihat oleh mata telanjang. Penemu mikroskop pertama kali secara luas adalah Zacharias Janssen pada tahun 1590, diikuti oleh penyempurnaan oleh Antony van Leeuwenhoek." },
                { title: "2. Bagian-Bagian Mikroskop", content: "Secara umum, mikroskop memiliki dua bagian utama:\n\n• Bagian Optik (Berhubungan dengan cahaya & lensa): Terdiri dari Lensa Okuler (dekat mata pengamat), Lensa Objektif (dekat objek), Kondensor (mengumpulkan cahaya), Diafragma (mengatur intensitas cahaya), dan Cermin/Lampu sumber cahaya.\n\n• Bagian Mekanik (Berhubungan dengan penyangga): Terdiri dari Makrometer (pemutar kasar untuk fokus cepat), Mikrometer (pemutar halus untuk menajamkan gambar), Revolver (pemilih perbesaran lensa), Meja Preparat (tempat objek), dan Penjepit Objek." }
            ],
            perbandingan: [
                { title: "Tabel Perbedaan Sel Hewan & Tumbuhan", content: "Berikut adalah poin penting perbedaan komponen sel hewan dan sel tumbuhan:\n\n1. Dinding Sel: Hanya dimiliki tumbuhan (membuat sel tumbuhan berbentuk kaku dan tetap).\n2. Kloroplas: Hanya dimiliki tumbuhan (untuk fotosintesis).\n3. Vakuola: Sel tumbuhan memiliki vakuola yang sangat besar, sedangkan sel hewan vakuolanya kecil atau tidak ada sama sekali.\n4. Sentriol: Hanya dimiliki sel hewan (berperan dalam pembelahan sel)." }
            ]
        };

        // ==========================================
        // 3. DATA BANK SOAL KUIS (LENGKAP 15 BUTIR MULTI-VARIASI)
        // ==========================================
        const INTERACTIVE_QUIZ_QUESTIONS = [
            { id: 1, type: "pilihan-ganda", question: "Siapakah ilmuwan yang pertama kali menemukan istilah 'sel' pada tahun 1665 saat mengamati sayatan gabus pohon ek?", options: [{key:"A", text:"Antony van Leeuwenhoek"}, {key:"B", text:"Robert Hooke"}, {key:"C", text:"Rudolf Virchow"}, {key:"D", text:"Theodor Schwann"}], answer: "B", explanation: "Robert Hooke mendefinisikan sel sebagai 'kamar kecil' dari sayatan gabus mati." },
            { id: 2, type: "pilihan-ganda", question: "Manakah di bawah ini yang merupakan contoh organisme uniseluler?", options: [{key:"A", text:"Amoeba dan Bakteri"}, {key:"B", text:"Jamur Kuping dan Lumut"}, {key:"C", text:"Cacing Tanah dan Paramecium"}, {key:"D", text:"Semut dan Ganggang hijau"}], answer: "A", explanation: "Amoeba dan Bakteri adalah contoh makhluk hidup bersel satu." },
            { id: 3, type: "pilihan-ganda", question: "Organel sel yang berfungsi sebagai pusat kendali seluruh aktivitas sel dan menyimpan materi genetik (DNA) adalah...", options: [{key:"A", text:"Mitokondria"}, {key:"B", text:"Sitoplasma"}, {key:"C", text:"Nukleus"}, {key:"D", text:"Kloroplas"}], answer: "C", explanation: "Nukleus mengontrol seluruh instruksi kerja sel." },
            { id: 4, type: "benar-salah", question: "Pernyataan: Sel hewan memiliki dinding sel yang kaku untuk memberikan perlindungan mekanis dan menjaga bentuk sel tetap stabil.", options: [{key:"A", text:"Benar"}, {key:"B", text:"Salah"}], answer: "B", explanation: "Salah, dinding sel hanya dimiliki oleh sel tumbuhan." },
            { id: 5, type: "benar-salah", question: "Pernyataan: Lensa objektif pada mikroskop adalah lensa yang posisinya berada paling dekat dengan mata pengamat saat praktikum.", options: [{key:"A", text:"Benar"}, {key:"B", text:"Salah"}], answer: "B", explanation: "Salah, lensa yang paling dekat dengan mata adalah lensa okuler." },
            { id: 6, type: "benar-salah", question: "Pernyataan: Sebelum mengamati objek dengan perbesaran tinggi, kita harus mengatur dan memfokuskan bayangan menggunakan lensa objektif perbesaran terendah terlebih dahulu.", options: [{key:"A", text:"Benar"}, {key:"B", text:"Salah"}], answer: "A", explanation: "Benar, pengamatan selalu dimulai dari perbesaran terkecil agar fokus mudah ditemukan." },
            { id: 7, type: "benar-salah", question: "Pernyataan: Mitokondria adalah tempat berlangsungnya respirasi sel untuk menghasilkan energi utama bagi kelangsungan hidup sel.", options: [{key:"A", text:"Benar"}, {key:"B", text:"Salah"}], answer: "A", explanation: "Benar, mitokondria dijuluki sebagai the power house of cell." },
            { id: 8, type: "pilihan-kompleks", question: "Manakah dari organel berikut yang HANYA dapat ditemukan di dalam sel tumbuhan? (Pilih semua jawaban yang benar):", options: [{key:"A", text:"Dinding Sel"}, {key:"B", text:"Kloroplas"}, {key:"C", text:"Lisosom"}, {key:"D", text:"Ribosom"}], answer: ["A", "B"], explanation: "Dinding sel dan kloroplas hanya dijumpai pada sel tumbuhan tumbuhan." },
            { id: 9, type: "pilihan-kompleks", question: "Manakah komponen mikroskop berikut yang termasuk dalam kelompok bagian optik? (Pilih semua jawaban yang benar):", options: [{key:"A", text:"Lensa Okuler"}, {key:"B", text:"Lensa Objektif"}, {key:"C", text:"Cermin / Lampu Sumber Cahaya"}, {key:"D", text:"Revolver"}], answer: ["A", "B", "C"], explanation: "Lensa okuler, objektif, dan cermin adalah bagian optik. Revolver adalah bagian mekanik." },
            { id: 10, type: "pilihan-kompleks", question: "Manakah pernyataan di bawah ini yang BENAR mengenai spesialisasi sel? (Pilih semua jawaban yang benar):", options: [{key:"A", text:"Terjadi pada organisme multiseluler"}, {key:"B", text:"Sel mengubah bentuknya sesuai fungsi spesifiknya"}, {key:"C", text:"Organisme uniseluler memiliki banyak jaringan organ"}, {key:"D", text:"Memungkinkan pembagian kerja efisien di dalam tubuh"}], answer: ["A", "B", "D"], explanation: "Spesialisasi sel hanya terjadi pada organisme multiseluler untuk efisiensi fungsi organ." },
            { id: 11, type: "menjodohkan", question: "Jodohkanlah organel-organel sel berikut dengan fungsinya secara tepat!", items: [{id:"m1", label:"Nukleus"}, {id:"m2", label:"Vakuola Tumbuhan"}, {id:"m3", label:"Membran Sel"}], options: [{key:"A", text:"Mengatur keluar masuknya zat dan melindungi isi sel"}, {key:"B", text:"Menyimpan cadangan makanan, air, dan pigmen sel"}, {key:"C", text:"Pusat pengendali seluruh metabolisme dan pembawa informasi genik"}], answer: { m1: "C", m2: "B", m3: "A" }, explanation: "Nukleus=Pusat kendali (C), Vakula=Penyimpan makanan (B), Membran Sel=Mengatur zat (A)." },
            { id: 12, type: "menjodohkan", question: "Pasangkan bagian mekanis mikroskop berikut ini dengan fungsinya yang paling tepat!", items: [{id:"m4", label:"Makrometer (Pemutar kasar)"}, {id:"m5", label:"Revolver"}, {id:"m6", label:"Meja Preparat"}], options: [{key:"A", text:"Tempat menaruh kaca objek/sediaan yang akan diamati"}, {key:"B", text:"Mengganti atau memilih tingkat perbesaran lensa objektif"}, {key:"C", text:"Menaik-turunkan tabung mikroskop secara cepat untuk mencari fokus awal"}], answer: { m4: "C", m5: "B", m6: "A" }, explanation: "Makrometer=Naik-turun cepat (C), Revolver=Pilih lensa (B), Meja=Tempat objek (A)." },
            { id: 13, type: "pilihan-ganda", question: "Mengapa sel tumbuhan cenderung memiliki bentuk yang tetap dan kaku bila dibandingkan dengan sel hewan?", options: [{key:"A", text:"Karena tumbuhan memiliki membran sel tebal"}, {key:"B", text:"Karena tumbuhan memiliki organel dinding sel dari selulosa"}, {key:"C", text:"Karena tumbuhan mengandung banyak air di sitoplasmanya"}, {key:"D", text:"Karena sel tumbuhan tidak mempunyai nukleus"}], answer: "B", explanation: "Adanya dinding sel dari selulosa memberikan struktur luar yang kaku pada sel tumbuhan." },
            { id: 14, type: "benar-salah", question: "Pernyataan: Robert Hooke mengamati sel hidup yang sedang aktif membelah diri ketika ia melihat sayatan gabus pohon ek di bawah mikroskop.", options: [{key:"A", text:"Benar"}, {key:"B", text:"Salah"}], answer: "B", explanation: "Salah, Robert Hooke mengamati sel gabus mati (ruangan kosong kosong)." },
            { id: 15, type: "menjodohkan", question: "Jodohkan ilmuwan-ilmuwan hebat berikut dengan kontribusinya bagi dunia mikroskopi!", items: [{id:"m7", label:"Zacharias Janssen"}, {id:"m8", label:"Antonie van Leeuwenhoek"}, {id:"m9", label:"Robert Hooke"}], options: [{key:"A", text:"Menemukan istilah sel terkecil pertama kali (1665)"}, {key:"B", text:"Menemukan dan merakit mikroskop dua lensa pertama (1590)"}, {key:"C", text:"Mengamati mikroorganisme hidup (animalkulus) di air hujan pertama kali"}], answer: { m7: "B", m8: "C", m9: "A" }, explanation: "Janssen=Dua lensa (B), Leeuwenhoek=Animalkulus (C), Hooke=Istilah sel (A)." }
        ];

        // ==========================================
        // 4. MAIN COMPONENT (REACT APP)
        // ==========================================
        function App() {
            const [activeTab, setActiveTab] = useState('materi');
            const [materiSubTab, setMateriSubTab] = useState('sel');
            
            // Kuis States
            const [quizStarted, setQuizStarted] = useState(false);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [selectedAnswers, setSelectedAnswers] = useState({}); // Menyimpan jawaban user
            const [quizSubmitted, setQuizSubmitted] = useState(false);
            const [score, setScore] = useState(0);

            // Tanya Guru AI States
            const [chatInput, setChatInput] = useState('');
            const [chatResponse, setChatResponse] = useState('');
            const [isTyping, setIsTyping] = useState(false);

            // Handler untuk Kuis Multi-Variasi
            const handleAnswerSelect = (qId, type, val) => {
                if (quizSubmitted) return;
                
                if (type === 'pilihan-ganda' || type === 'benar-salah') {
                    setSelectedAnswers({ ...selectedAnswers, [qId]: val });
                } else if (type === 'pilihan-kompleks') {
                    const currentArr = selectedAnswers[qId] || [];
                    if (currentArr.includes(val)) {
                        setSelectedAnswers({ ...selectedAnswers, [qId]: currentArr.filter(item => item !== val) });
                    } else {
                        setSelectedAnswers({ ...selectedAnswers, [qId]: [...currentArr, val] });
                    }
                }
            };

            const handleMenjodohkanSelect = (qId, itemId, optionKey) => {
                if (quizSubmitted) return;
                const currentObj = selectedAnswers[qId] || {};
                setSelectedAnswers({
                    ...selectedAnswers,
                    [qId]: { ...currentObj, [itemId]: optionKey }
                });
            };

            const submitQuizAndCalculate = () => {
                let correctCount = 0;
                
                INTERACTIVE_QUIZ_QUESTIONS.forEach((q) => {
                    const userAns = selectedAnswers[q.id];
                    if (!userAns) return;

                    if (q.type === 'pilihan-ganda' || q.type === 'benar-salah') {
                        if (userAns === q.answer) correctCount++;
                    } else if (q.type === 'pilihan-kompleks') {
                        const isMatch = Array.isArray(userAns) &&
                                        userAns.length === q.answer.length &&
                                        userAns.every(v => q.answer.includes(v));
                        if (isMatch) correctCount++;
                    } else if (q.type === 'menjodohkan') {
                        let allCorrect = true;
                        Object.keys(q.answer).forEach(key => {
                            if (userAns[key] !== q.answer[key]) allCorrect = false;
                        });
                        if (allCorrect) correctCount++;
                    }
                });

                setScore(Math.round((correctCount / INTERACTIVE_QUIZ_QUESTIONS.length) * 100));
                setQuizSubmitted(true);
            };

            // Simulasi AI Guru Responsif
            const handleAskAI = (e) => {
                e.preventDefault();
                if (!chatInput.trim()) return;
                setIsTyping(true);
                setChatResponse('');

                setTimeout(() => {
                    const txt = chatInput.toLowerCase();
                    let responseText = "Pertanyaan yang bagus! Mari kita pelajari bersama. Sel berukuran mikroskopis dan memerlukan alat bantu mikroskop untuk mengamatinya secara jelas. Ada yang ingin ditanyakan lagi?";
                    
                    if (txt.includes('sel')) {
                        responseText = "Sel adalah unit terkecil makhluk hidup. Sel tumbuhan memiliki dinding sel yang melindunginya sehingga berbentuk tetap, berbeda dengan sel hewan yang tidak mempunyainya.";
                    }
                    if (txt.includes('mikroskop')) {
                        responseText = "Mikroskop memiliki lensa okuler di atas dan lensa objektif di bawah. Untuk memfokuskan objek, gunakan pemutar kasar (makrometer) terlebih dahulu sebelum pemutar halus (mikrometer).";
                    }
                    if (txt.includes('kloroplas')) {
                        responseText = "Kloroplas adalah organel eksklusif pada sel tumbuhan yang mengandung zat hijau daun (klorofil). Fungsinya penting untuk menangkap cahaya matahari saat fotosintesis.";
                    }

                    setChatResponse(responseText);
                    setIsTyping(false);
                }, 1000);
            };

            return (
                <div className="flex flex-col min-h-screen bg-slate-50">
                    {/* BARIS ATAS NAVBAR UTAMA */}
                    <header className="bg-emerald-700 text-white shadow-md sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-white/10 p-2.5 rounded-xl border border-white/20">
                                    <i className="fa-solid fa-microscope text-2xl text-emerald-200"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-black tracking-tight">EduSel Kelas 8 SMP</h1>
                                    <p className="text-xs text-emerald-100 font-medium">Aplikasi Belajar Sel & Mikroskop Kurikulum Merdeka</p>
                                </div>
                            </div>
                            
                            <nav className="flex bg-black/10 p-1 rounded-xl border border-white/10">
                                <button onClick={() => setActiveTab('materi')} className={`px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'materi' ? 'bg-white text-emerald-800 shadow-sm' : 'text-emerald-100 hover:text-white'}`}>Materi</button>
                                <button onClick={() => setActiveTab('kisi')} className={`px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'kisi' ? 'bg-white text-emerald-800 shadow-sm' : 'text-emerald-100 hover:text-white'}`}>Kisi-Kisi</button>
                                <button onClick={() => setActiveTab('kuis')} className={`px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'kuis' ? 'bg-white text-emerald-800 shadow-sm' : 'text-emerald-100 hover:text-white'}`}>Kuis Interaktif</button>
                                <button onClick={() => setActiveTab('ai')} className={`px-4 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'ai' ? 'bg-white text-emerald-800 shadow-sm' : 'text-emerald-100 hover:text-white'}`}>Tanya Guru AI</button>
                            </nav>
                        </div>
                    </header>

                    {/* AREA UTAMA KONTEN */}
                    <main className="flex-1 max-w-5xl w-full mx-auto px-4 py-8">
                        
                        {/* TAB MATERI */}
                        {activeTab === 'materi' && (
                            <div className="space-y-6">
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Materi Pembelajaran Bab 1</p>
                                    <div className="flex flex-wrap gap-2">
                                        <button onClick={() => setMateriSubTab('sel')} className={`px-4 py-2.5 rounded-xl font-bold text-sm border flex items-center gap-2 ${materiSubTab === 'sel' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-white text-slate-600 border-slate-200'}`}><i className="fa-solid fa-dna"></i> Pengenalan Sel</button>
                                        <button onClick={() => setMateriSubTab('mikroskop')} className={`px-4 py-2.5 rounded-xl font-bold text-sm border flex items-center gap-2 ${materiSubTab === 'mikroskop' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-white text-slate-600 border-slate-200'}`}><i className="fa-solid fa-magnifying-glass"></i> Alat Mikroskop</button>
                                        <button onClick={() => setMateriSubTab('perbandingan')} className={`px-4 py-2.5 rounded-xl font-bold text-sm border flex items-center gap-2 ${materiSubTab === 'perbandingan' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-white text-slate-600 border-slate-200'}`}><i className="fa-solid fa-scale-balanced"></i> Perbandingan Sel</button>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    {MATERI_DATA[materiSubTab].map((item, index) => (
                                        <div key={index} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                            <h3 className="text-lg font-extrabold text-slate-800 mb-3">{item.title}</h3>
                                            <p className="text-slate-600 text-sm leading-relaxed whitespace-pre-line">{item.content}</p>
                                        </div>
                                    ))}

                                    {/* Sub Informasi Box Tambahan */}
                                    {materiSubTab === 'sel' && (
                                        <div className="bg-amber-50 border border-amber-200 p-5 rounded-2xl text-sm text-amber-900">
                                            <strong className="block mb-1 font-bold"><i className="fa-solid fa-circle-info"></i> Tahukah Kamu?</strong>
                                            Ukuran rata-rata sel makhluk hidup berkisar antara 10 hingga 100 mikrometer (10 µm - 100 µm). Sebagai gambaran, selembar kertas tebalnya sekitar 100.000 mikrometer! Jadi, sel sangatlah kecil dan mutlak membutuhkan mikroskop untuk diamati.
                                        </div>
                                    )}

                                    {materiSubTab === 'mikroskop' && (
                                        <div className="bg-blue-50 border border-blue-200 p-5 rounded-2xl text-sm text-blue-900">
                                            <strong className="block mb-2 font-bold"><i className="fa-solid fa-calculator"></i> Rumus Perbesaran Mikroskop:</strong>
                                            <div className="bg-white/80 p-3 rounded-lg font-mono text-center mb-2 border border-blue-100 font-bold">
                                                Perbesaran Total = Perbesaran Lensa Okuler × Perbesaran Lensa Objektif
                                            </div>
                                            <p>Contoh: Jika lensa okuler memakai perbesaran 10× dan lensa objektif memakai 40×, maka objek diperbesar sebanyak 400× lipat.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* TAB KISI-KISI */}
                        {activeTab === 'kisi' && (
                            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                <span className="text-xs font-bold text-emerald-700 bg-emerald-50 px-2.5 py-1 rounded-lg border border-emerald-100">Pemetaan Kompetensi</span>
                                <h2 className="text-xl font-extrabold text-slate-800 mt-2 mb-4">Kisi-Kisi Soal Penilaian Harian / Ujian</h2>
                                <div className="overflow-x-auto rounded-xl border border-slate-200">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase">
                                                <th className="p-4 text-center w-12">No</th>
                                                <th className="p-4 w-44">Materi / Topik Utama</th>
                                                <th className="p-4">Indikator Pencapaian Soal</th>
                                                <th className="p-4 text-center w-36">Level Kognitif</th>
                                                <th className="p-4 w-40">Bentuk Soal</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-sm divide-y divide-slate-200">
                                            {KISI_KISI_DATA.map((k) => (
                                                <tr key={k.no} className="hover:bg-slate-50/40">
                                                    <td className="p-4 text-center font-medium text-slate-400">{k.no}</td>
                                                    <td className="p-4 font-bold text-slate-800">{k.topik}</td>
                                                    <td className="p-4 text-slate-600">{k.indikator}</td>
                                                    <td className="p-4 text-center font-bold text-indigo-600">{k.level}</td>
                                                    <td className="p-4 text-slate-500 font-medium">{k.tipe}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* TAB KUIS INTERAKTIF */}
                        {activeTab === 'kuis' && (
                            <div className="max-w-3xl mx-auto">
                                {!quizStarted ? (
                                    <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm text-center space-y-4">
                                        <div className="w-16 h-16 bg-emerald-50 border border-emerald-200 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto text-2xl">
                                            <i className="fa-solid fa-paste"></i>
                                        </div>
                                        <h2 className="text-xl font-extrabold text-slate-800">Kuis Evaluasi Bab 1 (Super Lengkap)</h2>
                                        <p className="text-sm text-slate-500 max-w-md mx-auto">Uji kesiapan belajarmu dengan variasi soal Pilihan Ganda, Benar/Salah, Menjodohkan, dan Pilihan Lebih dari 1.</p>
                                        <div className="grid grid-cols-2 gap-2 text-xs font-bold text-slate-500 max-w-sm mx-auto bg-slate-50 p-3 rounded-xl border border-slate-100">
                                            <div className="text-left">Total Soal: <span className="text-slate-800">15 Butir Soal</span></div>
                                            <div className="text-left">Format Soal: <span className="text-slate-800">4 Tipe Variatif</span></div>
                                            <div className="text-left">Kriteria Kelulusan: <span className="text-slate-800">75 / 100</span></div>
                                        </div>
                                        <button onClick={() => setQuizStarted(true)} className="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-md transition-all w-full max-w-xs">Mulai Kuis Sekarang</button>
                                    </div>
                                ) : (
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                                        <div className="flex justify-between items-center border-b border-slate-100 pb-4">
                                            <div>
                                                <span className="text-xs font-bold text-slate-400 block uppercase">Progress Evaluasi</span>
                                                <span className="text-sm font-extrabold text-slate-800">Soal {currentIdx + 1} dari {INTERACTIVE_QUIZ_QUESTIONS.length}</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className={`text-xs font-bold px-2.5 py-1 rounded-lg border uppercase ${INTERACTIVE_QUIZ_QUESTIONS[currentIdx].type === 'menjodohkan' ? 'bg-purple-50 text-purple-700 border-purple-200' : 'bg-blue-50 text-blue-700 border-blue-200'}`}>
                                                    {INTERACTIVE_QUIZ_QUESTIONS[currentIdx].type}
                                                </span>
                                                {quizSubmitted && <span className="text-sm font-black bg-slate-900 text-white px-3 py-1 rounded-lg">Skor Akhir: {score}</span>}
                                            </div>
                                        </div>

                                        {/* Pertanyaan */}
                                        <div>
                                            <h3 className="text-base sm:text-lg font-bold text-slate-800 leading-snug">{INTERACTIVE_QUIZ_QUESTIONS[currentIdx].question}</h3>
                                        </div>

                                        {/* Form Opsi Berdasarkan Tipe Soal */}
                                        <div className="space-y-2.5">
                                            {(INTERACTIVE_QUIZ_QUESTIONS[currentIdx].type === 'pilihan-ganda' || INTERACTIVE_QUIZ_QUESTIONS[currentIdx].type === 'benar-salah') && 
                                                INTERACTIVE_QUIZ_QUESTIONS[currentIdx].options.map((opt) => {
                                                    const isChecked = selectedAnswers[INTERACTIVE_QUIZ_QUESTIONS[currentIdx].id] === opt.key;
                                                    return (
                                                        <button key={opt.key} disabled={quizSubmitted} onClick={() => handleAnswerSelect(INTERACTIVE_QUIZ_QUESTIONS[currentIdx].id, INTERACTIVE_QUIZ_QUESTIONS[currentIdx].type, opt.key)}
                                                            className={`w-full text-left p-4 rounded-xl border flex items-center gap-3 text-sm transition-all ${isChecked ? 'border-emerald-600 bg-emerald-50/50 text-emerald-900 font-medium' : 'border-slate-200 hover:bg-slate-50 text-slate-700'}`}>
                                                            <span className={`w-6 h-6 rounded-lg font-bold text-xs flex items-center justify-center ${isChecked ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-500'}`}>{opt.key}</span>
                                                            <span>{opt.text}</span>
                                                        </button>
                                                    );
                                                })
                                            }

                                            {INTERACTIVE_QUIZ_QUESTIONS[currentIdx].type === 'pilihan-kompleks' &&
                                                INTERACTIVE_QUIZ_QUESTIONS[currentIdx].options.map((opt) => {
                                                    const arr = selectedAnswers[INTERACTIVE_QUIZ_QUESTIONS[currentIdx].id] || [];
                                                    const isChecked = arr.includes(opt.key);
                                                    return (
                                                        <button key={opt.key} disabled={quizSubmitted} onClick={() => handleAnswerSelect(INTERACTIVE_QUIZ_QUESTIONS[currentIdx].id, INTERACTIVE_QUIZ_QUESTIONS[currentIdx].type, opt.key)}
                                                            className={`w-full text-left p-4 rounded-xl border flex items-center gap-3 text-sm transition-all ${isChecked ? 'border-indigo-600 bg-indigo-50/50 text-indigo-900 font-medium' : 'border-slate-200 hover:bg-slate-50 text-slate-700'}`}>
                                                            <span className={`w-5 h-5 rounded border flex items-center justify-center text-xs ${isChecked ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300'}`}>{isChecked && "✓"}</span>
                                                            <span>{opt.text}</span>
                                                        </button>
                                                    );
                                                })
                                            }

                                            {INTERACTIVE_QUIZ_QUESTIONS[currentIdx].type === 'menjodohkan' && (
                                                <div className="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    {INTERACTIVE_QUIZ_QUESTIONS[currentIdx].items.map((item) => {
                                                        const currentSelection = (selectedAnswers[INTERACTIVE_QUIZ_QUESTIONS[currentIdx].id] || {})[item.id] || "";
                                                        return (
                                                            <div key={item.id} className="bg-white p-3 rounded-lg border border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                                                                <span className="font-bold text-sm text-slate-800">{item.label}</span>
                                                                <select disabled={quizSubmitted} value={currentSelection} onChange={(e) => handleMenjodohkanSelect(INTERACTIVE_QUIZ_QUESTIONS[currentIdx].id, item.id, e.target.value)}
                                                                    className="text-xs p-2 rounded-lg border border-slate-200 bg-slate-50 font-medium focus:outline-none focus:border-purple-500 w-full sm:w-auto">
                                                                    <option value="">-- Jodohkan ke --</option>
                                                                    {INTERACTIVE_QUIZ_QUESTIONS[currentIdx].options.map(o => (
                                                                        <option key={o.key} value={o.key}>{o.key}. {o.text}</option>
                                                                    ))}
                                                                </select>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>

                                        {/* Kunci Jawaban & Pembahasan */}
                                        {quizSubmitted && (
                                            <div className="p-4 bg-amber-50 border border-amber-200 rounded-xl text-xs space-y-1">
                                                <span className="font-bold text-amber-800 block"><i className="fa-solid fa-lightbulb"></i> Pembahasan Kunci Jawaban:</span>
                                                <p className="text-amber-900 font-medium">{INTERACTIVE_QUIZ_QUESTIONS[currentIdx].explanation}</p>
                                            </div>
                                        )}

                                        {/* Navigasi Kuis */}
                                        <div className="flex justify-between items-center border-t border-slate-100 pt-4">
                                            <button disabled={currentIdx === 0} onClick={() => setCurrentIdx(currentIdx - 1)} className="px-4 py-2 border border-slate-200 text-slate-600 rounded-xl text-xs font-bold disabled:opacity-40">Sebelumnya</button>
                                            
                                            {currentIdx < INTERACTIVE_QUIZ_QUESTIONS.length - 1 ? (
                                                <button onClick={() => setCurrentIdx(currentIdx + 1)} className="px-4 py-2 bg-slate-800 text-white rounded-xl text-xs font-bold">Berikutnya</button>
                                            ) : (
                                                !quizSubmitted && <button onClick={submitQuizAndCalculate} className="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs font-bold shadow-sm">Kirim Semua Jawaban</button>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* TAB TANYA GURU AI */}
                        {activeTab === 'ai' && (
                            <div className="max-w-2xl mx-auto bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                                <div className="bg-gradient-to-r Kahn bg-emerald-800 text-white p-4 flex items-center gap-3">
                                    <div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-lg"><i className="fa-solid fa-robot"></i></div>
                                    <div>
                                        <h3 className="font-bold text-sm">Fitur Interaktif Gemini AI</h3>
                                        <p className="text-xs text-emerald-200">Asisten Pintar Guru IPA Biologi Kelas 8</p>
                                    </div>
                                </div>
                                
                                <div className="p-6 space-y-4 min-h-[200px] flex flex-col justify-between">
                                    <div>
                                        <div className="bg-slate-50 border border-slate-100 p-3.5 rounded-xl text-xs text-slate-600 mb-3 font-medium leading-relaxed">
                                            Halo! Saya adalah Asisten Guru IPA Anda. Tanyakan apa saja mengenai materi Sel tumbuhan, hewan, spesialisasi jaringan, hingga rumus perhitungan mikroskop.
                                        </div>
                                        
                                        {isTyping && <div className="text-xs text-slate-400 font-medium animate-pulse"><i className="fa-solid fa-circle-notch animate-spin"></i> Mengetik jawaban...</div>}
                                        
                                        {chatResponse && (
                                            <div className="bg-emerald-50 border border-emerald-100 p-4 rounded-xl text-xs text-emerald-900 leading-relaxed font-medium shadow-sm">
                                                <strong className="block text-emerald-800 mb-1">Jawaban Guru AI:</strong>
                                                {chatResponse}
                                            </div>
                                        )}
                                    </div>

                                    <form onSubmit={handleAskAI} className="flex gap-2 border-t border-slate-100 pt-4 mt-4">
                                        <input type="text" value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder="Tanyakan tentang dinding sel, lensa objektif, kloroplas..." 
                                            className="flex-1 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-medium focus:outline-none focus:bg-white focus:border-emerald-600 transition-all"/>
                                        <button type="submit" className="px-4 py-2.5 bg-emerald-600 text-white rounded-xl text-xs font-bold hover:bg-emerald-700 transition-all">Kirim</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-slate-900 text-slate-400 text-center py-4 border-t border-slate-800 text-xs font-medium mt-12">
                        EduSel IPA Kelas 8 SMP Bab 1 - Pengenalan Sel dan Mikroskop <br/>
                        &copy; 2026 Aplikasi Pembelajaran Mandiri Interaktif. Selamat Belajar!
                    </footer>
                </div>
            );
        }

        // Render Utama Menggunakan Arsitektur React 17 Stabil
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
