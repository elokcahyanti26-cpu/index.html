        startQuiz() {

        },
        toggleMultiSelect(qId, option) {
            if(this.quizSubmitted) return;
            let index = this.answers[qId].indexOf(option);
            if(index > -1) {
                this.answers[qId].splice(index, 1);
            } else {
                this.answers[qId].push(option);
            }
        },
        submitQuiz() {
            let totalScore = 0;
            this.questions.forEach((q) => {
                let userAnswer = this.answers[q.id];
                if (!userAnswer) return;
                if (q.type === 'pilihan-ganda' || q.type === 'benar-salah') {
                    if (userAnswer === q.answer) totalScore += 1;
                } else if (q.type === 'multi-select') {
                    let isMatch = q.answer.length === userAnswer.length && q.answer.every(v => userAnswer.includes(v));
                    if (isMatch) totalScore += 1;
                } else if (q.type === 'matching') {
                    let allCorrect = true;
                    q.pairs.forEach(p => {
                        if (userAnswer[p.key] !== p.correct) allCorrect = false;
                    });
                    if (allCorrect) totalScore += 1;
                }
            });
            this.score = Math.round((totalScore / this.questions.length) * 100);
            this.quizSubmitted = true;
        },
        // Fungsi Chatbot

                            <tr><td class="p-3 text-center font-bold">1</td><td class="p-3 font-semibold">Pengenalan Sel</td><td class="p-3">Siswa dapat menjelaskan pengertian sel dan mengidentifikasi penemu sel pertama kali.</td><td class="p-3 text-center"><span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">C1</span></td><td class="p-3">Pilihan Ganda & Menjodohkan</td></tr>
                            <tr><td class="p-3 text-center font-bold">2</td><td class="p-3 font-semibold">Uniseluler & Multiseluler</td><td class="p-3">Siswa dapat membedakan ciri-ciri organisme uniseluler dan multiseluler beserta contohnya.</td><td class="p-3 text-center"><span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">C2</span></td><td class="p-3">Pilihan Ganda Kompleks</td></tr>
                            <tr><td class="p-3 text-center font-bold">3</td><td class="p-3 font-semibold">Organel Sel</td><td class="p-3">Siswa dapat mencocokkan nama organel sel dengan fungsi spesifiknya di dalam sel.</td><td class="p-3 text-center"><span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">C3</span></td><td class="p-3">Menjodohkan & Benar/Salah</td></tr>
                            <tr><td class="p-3 text-center font-bold">4</td><td class="p-3 font-semibold">Perbedaan Sel</td><td class="p-3">Siswa dapat menganalisis perbedaan struktur sel tumbuhan dan sel hewan.</td><td class="p-3 text-center"><span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">C4</span></td><td class="p-3">Pilihan Ganda Kompleks</td></tr>
                            <tr><td class="p-3 text-center font-bold">5</td><td class="p-3 font-semibold">Bagian Mikroskop</td><td class="p-3">Siswa dapat mengidentifikasi bagian optik dan mekanik pada mikroskop.</td><td class="p-3 text-center"><span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">C2</span></td><td class="p-3">Menjodohkan</td></tr>
                            <tr><td class="p-3 text-center font-bold">6</td><td class="p-3 font-semibold">Langkah Kerja Mikroskop</td><td class="p-3">Siswa dapat mengurutkan langkah-langkah penggunaan mikroskop secara aman.</td><td class="p-3 text-center"><span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">C3</span></td><td class="p-3">Benar/Salah & Pilihan Ganda</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </template>

        <template x-if="activeTab === 'kuis'">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <template x-if="!quizStarted">
                    <div class="text-center py-8 space-y-4 max-w-md mx-auto">
                        <h2 class="text-xl font-bold text-slate-900">Kuis Evaluasi Bab 1</h2>
                        <p class="text-xs text-slate-500">15 Soal latihan multi-variasi (Pilihan Ganda, Benar/Salah, Menjodohkan, Kompleks).</p>
                        <button @click="startQuiz()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-xs transition-all">Mulai Kuis</button>
                    </div>
                </template>

                <template x-if="quizStarted">
                    <div class="space-y-6">
                        <div class="flex items-center justify-between text-xs pb-3 border-b border-slate-100">
                            <h3 class="font-bold text-sm">Soal <span x-text="currentQuestionIndex + 1"></span> dari <span x-text="questions.length"></span></h3>
                            <span class="bg-slate-100 text-slate-700 px-3 py-1 rounded-full font-bold uppercase" x-text="questions[currentQuestionIndex].type"></span>
                        </div>

                        <div class="space-y-2">
                            <h4 class="text-sm font-semibold text-slate-800" x-text="questions[currentQuestionIndex].question"></h4>
                        </div>

                        <div class="pt-2">
                            <template x-if="questions[currentQuestionIndex].type === 'pilihan-ganda' || questions[currentQuestionIndex].type === 'benar-salah'">
                                <div class="grid grid-cols-1 gap-2">
                                    <template x-for="option in questions[currentQuestionIndex].options" :key="option">
                                        <button @click="if(!quizSubmitted) answers[questions[currentQuestionIndex].id] = option"
                                                :class="answers[questions[currentQuestionIndex].id] === option ? 'bg-emerald-50 border-emerald-500 text-emerald-900 font-semibold' : 'bg-white border-slate-200'"
                                                class="w-full text-left p-3.5 rounded-xl border text-xs transition-all hover:bg-slate-50"
                                                x-text="option">
                                        </button>
                                    </template>
                                </div>
                            </template>

                            <template x-if="questions[currentQuestionIndex].type === 'multi-select'">
                                <div class="grid grid-cols-1 gap-2">
                                    <template x-for="option in questions[currentQuestionIndex].options" :key="option">
                                        <button @click="toggleMultiSelect(questions[currentQuestionIndex].id, option)"
                                                :class="answers[questions[currentQuestionIndex].id].includes(option) ? 'bg-emerald-50 border-emerald-500 font-semibold' : 'bg-white border-slate-200'"
                                                class="w-full text-left p-3.5 rounded-xl border text-xs transition-all flex items-center">
                                            <input type="checkbox" :checked="answers[questions[currentQuestionIndex].id].includes(option)" class="mr-3 pointer-events-none">
                                            <span x-text="option"></span>
                                        </button>
                                    </template>
                                </div>
                            </template>

                            <template x-if="questions[currentQuestionIndex].type === 'matching'">
                                <div class="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                    <template x-for="pair in questions[currentQuestionIndex].pairs" :key="pair.key">
                                        <div class="bg-white p-3 rounded-lg border flex flex-col space-y-1">
                                            <label class="text-xs font-bold text-slate-700" x-text="pair.key"></label>
                                            <select x-model="answers[questions[currentQuestionIndex].id][pair.key]" :disabled="quizSubmitted" class="w-full text-xs p-2 rounded border bg-slate-50">
                                                <option value="">-- Jodohkan Jawaban Di Sini --</option>
                                                <template x-for="opt in pair.options" :key="opt">
                                                    <option :value="opt" x-text="opt"></option>
                                                </template>
                                            </select>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>

                        <template x-if="quizSubmitted">
                            <div class="bg-slate-900 text-white p-4 rounded-xl text-center text-xs">
                                <span class="text-slate-400">Nilai Akumulasi Anda:</span> <strong class="text-emerald-400 text-lg ml-1" x-text="score + ' / 100'"></strong>
                            </div>
                        </template>

                        <div class="flex items-center justify-between pt-4 border-t text-xs">
                            <button @click="currentQuestionIndex = Math.max(0, currentQuestionIndex - 1)" :disabled="currentQuestionIndex === 0" class="px-4 py-2 border rounded-lg disabled:opacity-40">Sebelumnya</button>
                            
                            <template x-if="currentQuestionIndex < questions.length - 1">
                                <button @click="currentQuestionIndex++" class="px-4 py-2 bg-emerald-600 text-white rounded-lg">Berikutnya</button>
                            </template>
                            
                            <template x-if="currentQuestionIndex === questions.length - 1 && !quizSubmitted">
                                <button @click="submitQuiz()" class="px-5 py-2 bg-blue-600 text-white rounded-lg font-bold shadow">Kirim Jawaban</button>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <template x-if="activeTab === 'tanyaai'">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[450px]">
                <h2 class="text-xl font-bold">Tanya Guru IPA AI</h2>
                <hr class="my-3"/>
                <div class="flex-1 overflow-y-auto space-y-3 pr-1 custom-scrollbar text-xs">
                    <template x-for="msg in messages" :key="msg.id">
                        <div :class="msg.sender === 'user' ? 'justify-end' : 'justify-start'" class="flex">
                            <div :class="msg.sender === 'user' ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-800 border'" class="max-w-lg p-3 rounded-xl shadow-xs">
                                <p x-text="msg.text"></p>
                            </div>
                        </div>
                    </template>
                </div>
                <form @submit.prevent="sendChat()" class="mt-3 flex items-center space-x-2 pt-2 border-t">
                    <input type="text" x-model="inputChat" placeholder="Tanyakan materi sel di sini (contoh: apa beda sel hewan dan tumbuhan?)..." class="flex-1 text-xs p-3 rounded-xl border bg-slate-50 focus:outline-none focus:bg-white focus:border-emerald-500"/>
                    <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-5 py-3 rounded-xl transition-colors">Kirim</button>
                </form>
            </div>
        </template>
    </div>

</body>
</html>
