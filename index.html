      { id: 12, type: "menjodohkan", question: "Pasangkan bagian mekanis mikroskop berikut ini dengan fungsinya yang paling tepat!", items: [
          { left: "Makrometer (Pemutar Kasar)", options: ["Tempat menaruh kaca objek/sediaan yang akan diamati", "Mengganti atau memilih tingkat perbesaran lensa objektif", "Menaik-turunkan tabung mikroskop secara cepat untuk mencari fokus awal"], rightAnswer: "Menaik-turunkan tabung mikroskop secara cepat untuk mencari fokus awal" },
          { left: "Revolver", options: ["Tempat menaruh kaca objek/sediaan yang akan diamati", "Mengganti atau memilih tingkat perbesaran lensa objektif", "Menaik-turunkan tabung mikroskop secara cepat untuk mencari fokus awal"], rightAnswer: "Mengganti atau memilih tingkat perbesaran lensa objektif" },

      { id: 14, type: "benar-salah", question: "Pernyataan: Robert Hooke mengamati sel hidup yang sedang aktif membelah diri ketika ia melihat sayatan gabus pohon ek di bawah mikroskop.", answer: "Salah", hint: "Bacalah kalimat pernyataan di atas secara saksama. Tentukan keputusanmu dengan mengklik tombol 'Benar' atau 'Salah' (merah)." },
      { id: 15, type: "menjodohkan", question: "Jodohkan ilmuwan-ilmuwan hebat berikut dengan kontribusinya bagi dunia mikroskopi!", items: [

          { left: "Antonie van Leeuwenhoek", options: ["Menemukan sel pertama kali dari sayatan gabus", "Diakui sebagai penemu mikroskop pertama (1590)", "Ilmuwan pertama yang melihat mikroorganisme hidup sel tunggal"], rightAnswer: "Ilmuwan pertama yang melihat mikroorganisme hidup sel tunggal" },
          { left: "Robert Hooke", options: ["Menemukan sel pertama kali dari sayatan gabus", "Diakui sebagai penemu mikroskop pertama (1590)", "Ilmuwan pertama yang melihat mikroorganisme hidup sel tunggal"], rightAnswer: "Menemukan sel pertama kali dari sayatan gabus" }

    function App() {
      const [activeTab, setActiveTab] = useState('materi');
      const [materiSubTab, setMateriSubTab] = useState('sel');
      
      // State untuk Manajemen Kuis 15 Nomor
      const [quizActive, setQuizActive] = useState(false);
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [userAnswers, setUserAnswers] = useState({}); // { 0: 'Jawaban', 3: ['A','B'], 10: { 'Nukleus': 'Pusat...' } }
      const [quizSubmitted, setQuizSubmitted] = useState(false);
      const [score, setScore] = useState(0);

      const resetQuiz = () => {
        setQuizActive(true);
        setCurrentQIndex(0);
        setUserAnswers({});
        setQuizSubmitted(false);
        setScore(0);
      };

      const handlePilihanGandaSelect = (ans) => {
        if (quizSubmitted) return;
        setUserAnswers({ ...userAnswers, [currentQIndex]: ans });
      };

      const handleBenarSalahSelect = (ans) => {
        if (quizSubmitted) return;
        setUserAnswers({ ...userAnswers, [currentQIndex]: ans });
      };

      const handleKompleksToggle = (opt) => {
        if (quizSubmitted) return;
        const currentAns = userAnswers[currentQIndex] || [];
        if (currentAns.includes(opt)) {
          setUserAnswers({ ...userAnswers, [currentQIndex]: currentAns.filter(item => item !== opt) });
        } else {
          setUserAnswers({ ...userAnswers, [currentQIndex]: [...currentAns, opt] });
        }
      };

      const handleMenjodohkanSelect = (itemLeft, selectedVal) => {
        if (quizSubmitted) return;
        const currentAns = userAnswers[currentQIndex] || {};
        setUserAnswers({
          ...userAnswers,
          [currentQIndex]: { ...currentAns, [itemLeft]: selectedVal }
        });
      };

      const submitQuizAndCalculate = () => {
        let correctPoints = 0;
        INTERACTIVE_QUIZ_QUESTIONS.forEach((q, idx) => {
          const userAns = userAnswers[idx];
          if (!userAns) return;

          if (q.type === "pilihan-ganda" || q.type === "benar-salah") {
            if (userAns === q.answer) correctPoints++;
          } 
          else if (q.type === "pilihan-kompleks") {
            const isMatch = Array.isArray(userAns) &&
              userAns.length === q.answer.length &&
              userAns.every(v => q.answer.includes(v));
            if (isMatch) correctPoints++;
          } 
          else if (q.type === "menjodohkan") {
            let allCorrect = true;
            q.items.forEach(it => {
              if (userAns[it.left] !== it.rightAnswer) allCorrect = false;
            });
            if (allCorrect) correctPoints++;
          }
        });

        const finalScore = Math.round((correctPoints / INTERACTIVE_QUIZ_QUESTIONS.length) * 100);
        setScore(finalScore);
        setQuizSubmitted(true);
      };

      return (
        <div className="flex flex-col min-h-screen">

              <div className="flex items-center gap-3.5">

                  <i className="fa-solid fa-microscope text-2xl text-emerald-200"></i>
                </div>

                </div>
              </div>

                  <i className="fa-solid fa-book-open text-xs"></i> Materi
                </button>
                <button onClick={() => { setActiveTab('kisikisi'); setQuizActive(false); }} className={`px-5 py-2.5 rounded-xl transition-all duration-200 flex items-center gap-2 ${activeTab === 'kisikisi' ? 'bg-white text-emerald-800 shadow-md' : 'text-emerald-100 hover:bg-white/5'}`}>
                  <i className="fa-solid fa-table-list text-xs"></i> Kisi-Kisi
                </button>
                <button onClick={() => { setActiveTab('kuis'); }} className={`px-5 py-2.5 rounded-xl transition-all duration-200 flex items-center gap-2 ${activeTab === 'kuis' ? 'bg-white text-emerald-800 shadow-md' : 'text-emerald-100 hover:bg-white/5'}`}>
                  <i className="fa-solid fa-graduation-cap text-xs"></i> Kuis Interaktif
                </button>
              </nav>
            </div>
          </header>

          {/* AREA UTAMA */}
          <main className="flex-grow max-w-6xl w-full mx-auto px-4 py-8">
            
            {/* 1. KONTEN MENU MATERI */}
            {activeTab === 'materi' && (
              <div className="space-y-6">
                <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-150 flex flex-wrap gap-2.5">
                  <div className="text-slate-400 font-bold text-xs uppercase tracking-wider self-center mr-2 pl-2">Materi Pembelajaran Bab 1</div>
                  <button onClick={() => setMateriSubTab('sel')} className={`px-5 py-3 rounded-xl text-sm font-bold transition-all flex items-center gap-2.5 ${materiSubTab === 'sel' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200 shadow-sm' : 'text-slate-600 border border-transparent hover:bg-slate-50'}`}>
                    <i className="fa-solid fa-dna text-emerald-600"></i> Pengenalan Sel
                  </button>
                  <button onClick={() => setMateriSubTab('mikroskop')} className={`px-5 py-3 rounded-xl text-sm font-bold transition-all flex items-center gap-2.5 ${materiSubTab === 'mikroskop' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200 shadow-sm' : 'text-slate-600 border border-transparent hover:bg-slate-50'}`}>
                    <i className="fa-solid fa-microscope text-emerald-600"></i> Alat Mikroskop
                  </button>
