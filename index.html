            },
            {
                id: 2,
                type: "pilihan-ganda",

            },

                options: ["Sel tumbuhan memiliki bentuk yang tetap karena mempunyai dinding sel", "Sel hewan memiliki vakuola yang ukurannya sangat besar dibanding sel tumbuhan", "Sel hewan memiliki sentriol yang membantu proses pembelahan sel", "Sel tumbuhan tidak memiliki membran sel"],
                answer: ["Sel tumbuhan memiliki bentuk yang tetap karena mempunyai dinding sel", "Sel hewan memiliki sentriol yang membantu proses pembelahan sel"],

            },
            {
                id: 11,

                pairs: [
                    { key: "Nukleus", options: ["Mengatur keluar masuknya zat", "Menyimpan cadangan makanan", "Pusat pengendali seluruh metabolisme dan pembawa informasi genik"], correct: "Pusat pengendali seluruh metabolisme dan pembawa informasi genik" },
                    { key: "Vakuola Tumbuhan", options: ["Mengatur keluar masuknya zat", "Menyimpan cadangan makanan", "Pusat pengendali seluruh metabolisme dan pembawa informasi genik"], correct: "Menyimpan cadangan makanan" },
                    { key: "Membran Sel", options: ["Mengatur keluar masuknya zat", "Menyimpan cadangan makanan", "Pusat pengendali seluruh metabolisme dan pembawa informasi genik"], correct: "Mengatur keluar masuknya zat" }
                ],
                hint: "Jodohkan setiap butir di kolom kiri dengan jawaban pasangannya di kolom kanan melalui menu dropdown."
            },
            {
                id: 12,
                type: "matching",
                question: "Pasangkan bagian mekanis mikroskop berikut ini dengan fungsinya yang paling tepat!",
                pairs: [
                    { key: "Makrometer (Pemutar kasar)", options: ["Tempat menaruh objek/sediaan yang akan diamati", "Mengganti atau memilih tingkat perbesaran lensa objektif", "Naik-turunkan tabung mikroskop secara cepat untuk mencari fokus awal"], correct: "Naik-turunkan tabung mikroskop secara cepat untuk mencari fokus awal" },
                    { key: "Revolver", options: ["Tempat menaruh objek/sediaan yang akan diamati", "Mengganti atau memilih tingkat perbesaran lensa objektif", "Naik-turunkan tabung mikroskop secara cepat untuk mencari fokus awal"], correct: "Mengganti atau memilih tingkat perbesaran lensa objektif" },
                    { key: "Meja Preparat", options: ["Tempat menaruh objek/sediaan yang akan diamati", "Mengganti atau memilih tingkat perbesaran lensa objektif", "Naik-turunkan tabung mikroskop secara cepat untuk mencari fokus awal"], correct: "Tempat menaruh objek/sediaan yang akan diamati" }
                ],
                hint: "Suaikan bagian komponen mekanik dengan peruntukannya masing-masing."
            },
            {
                id: 13,
                type: "pilihan-ganda",
                question: "Mengapa sel tumbuhan cenderung memiliki bentuk yang tetap dan kaku bila dibandingkan dengan sel hewan?",
                options: ["Karena sel tumbuhan memiliki dinding sel yang tersusun atas selulosa", "Karena sel tumbuhan memiliki kloroplas untuk fotosintesis", "Karena sel tumbuhan tidak mempunyai nukleus", "Karena vakuola sel tumbuhan berukuran sangat kecil"],
                answer: "Karena sel tumbuhan memiliki dinding sel yang tersusun atas selulosa",
                hint: "Pikirkan organel pelindung terluar yang membedakan sel tumbuhan dari sel hewan."
            },
            {
                id: 14,
                type: "benar-salah",
                question: "Pernyataan: Robert Hooke mengamati sel hidup yang sedang aktif membelah diri ketika ia melihat sayatan gabus pohon ek di bawah mikroskop.",
                options: ["Benar", "Salah"],
                answer: "Salah",
                hint: "Ingat kembali fakta sejarah sel gabus, apakah itu struktur sel hidup atau ruangan sel mati kaku."
            },
            {
                id: 15,
                type: "matching",
                question: "Jodohkan ilmuwan-ilmuwan hebat berikut dengan kontribusinya bagi dunia mikroskopi!",
                pairs: [
                    { key: "Zacharias Janssen", options: ["Menemukan sel pertama kali dari sayatan gabus", "Ilmuwan pertama yang melihat mikroorganisme hidup di air hujan", "Diakui sebagai penemu mikroskop pertama pada tahun 1590"], correct: "Diakui sebagai penemu mikroskop pertama pada tahun 1590" },
                    { key: "Antonie van Leeuwenhoek", options: ["Menemukan sel pertama kali dari sayatan gabus", "Ilmuwan pertama yang melihat mikroorganisme hidup di air hujan", "Diakui sebagai penemu mikroskop pertama pada tahun 1590"], correct: "Ilmuwan pertama yang melihat mikroorganisme hidup di air hujan" },
                    { key: "Robert Hooke", options: ["Menemukan sel pertama kali dari sayatan gabus", "Ilmuwan pertama yang melihat mikroorganisme hidup di air hujan", "Diakui sebagai penemu mikroskop pertama pada tahun 1590"], correct: "Menemukan sel pertama kali dari sayatan gabus" }
                ],
                hint: "Hubungkan nama tokoh pionir biologi sel dengan temuan legendarisnya."
            }
        ];

        // ============================ UTAMA RESONSIVE COMPONENT ============================
        function App() {
            const [activeTab, setActiveTab] = useState("materi"); 
            const [subMateri, setSubMateri] = useState("pengenalan-sel"); 
            
            // Kuis States
            const [quizStarted, setQuizStarted] = useState(false);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [selectedAnswers, setSelectedAnswers] = useState({}); 
            const [quizSubmitted, setQuizSubmitted] = useState(false);
            const [score, setScore] = useState(0);

            // Tanya Guru AI States
            const [messages, setMessages] = useState([
                { id: 1, sender: "bot", text: "Halo! Saya adalah Asisten Guru Pro IPA AI. Silakan tanyakan apa saja tentang materi Bab 1 Kelas 8: Pengenalan Sel dan Mikroskop!" }
            ]);
            const [inputChat, setInputChat] = useState("");

            const startQuiz = () => {
                setQuizStarted(true);
                setCurrentQuestionIndex(0);
                setSelectedAnswers({});
                setQuizSubmitted(false);
                setScore(0);
            };

            const handleAnswerSelect = (qId, type, data) => {
                if (quizSubmitted) return;
                
                if (type === "multi-select") {
                    const currentAnswers = selectedAnswers[qId] || [];
                    if (currentAnswers.includes(data)) {
                        setSelectedAnswers({ ...selectedAnswers, [qId]: currentAnswers.filter(item => item !== data) });
                    } else {
                        setSelectedAnswers({ ...selectedAnswers, [qId]: [...currentAnswers, data] });
                    }
                } else if (type === "matching") {
                    const currentMatching = selectedAnswers[qId] || {};
                    setSelectedAnswers({
                        ...selectedAnswers,
                        [qId]: { ...currentMatching, [data.pairKey]: data.value }
                    });
                } else {
                    setSelectedAnswers({ ...selectedAnswers, [qId]: data });
                }
            };

            const submitQuiz = () => {
                let totalScore = 0;
                QUIZ_QUESTIONS.forEach((q) => {
                    const userAnswer = selectedAnswers[q.id];
                    if (!userAnswer) return;

                    if (q.type === "pilihan-ganda" || q.type === "benar-salah") {
                        if (userAnswer === q.answer) totalScore += 1;
                    } else if (q.type === "multi-select") {
                        const isMatch = q.answer.length === userAnswer.length && q.answer.every(v => userAnswer.includes(v));
                        if (isMatch) totalScore += 1;
                    } else if (q.type === "matching") {
                        let allCorrect = true;
                        q.pairs.forEach(p => {
                            if (userAnswer[p.key] !== p.correct) allCorrect = false;
                        });
                        if (allCorrect) totalScore += 1;
                    }
                });

                const finalScore = Math.round((totalScore / QUIZ_QUESTIONS.length) * 100);
                setScore(finalScore);
                setQuizSubmitted(true);
            };

            const handleSendChat = (e) => {
                e.preventDefault();
                if (!inputChat.trim()) return;

                const userMessage = { id: Date.now(), sender: "user", text: inputChat };
                setMessages(prev => [...prev, userMessage]);
                setInputChat("");

                setTimeout(() => {
                    let replyText = "Pertanyaan yang sangat bagus! Terkait hal tersebut, materi Bab 1 menjelaskan bahwa kesatuan terkecil kehidupan dinamakan sel.";
                    const lowerText = inputChat.toLowerCase();
                    
                    if (lowerText.includes("hewan") || lowerText.includes("tumbuhan") || lowerText.includes("beda")) {
                        replyText = "Perbedaan mencoloknya adalah Sel Tumbuhan memiliki Dinding Sel dan Kloroplas, sedangkan Sel Hewan memiliki Sentriol namun tidak memiliki dinding sel.";
                    } else if (lowerText.includes("mikroskop") || lowerText.includes("lensa")) {
                        replyText = "Bagian Mikroskop terbagi dua: Optik (Lensa okuler, objektif, cermin) dan Mekanik (revolver, makrometer, mikrometer, meja preparat).";
                    } else if (lowerText.includes("penemu") || lowerText.includes("sejarah")) {
                        replyText = "Istilah sel pertama kali dicetuskan oleh Robert Hooke pada tahun 1665 saat meneliti sayatan tipis gabus pohon ek.";
                    }

                    setMessages(prev => [...prev, { id: Date.now() + 1, sender: "bot", text: replyText }]);
                }, 8000;

            return (
                <div class="max-w-6xl mx-auto px-4 py-6">
                    {/* APP HEADER */}
                    <header class="flex flex-col md:flex-row md:items-center md:justify-between bg-emerald-700 text-white p-5 rounded-2xl shadow-md mb-6">
                        <div class="flex items-center space-x-4">
                            <div class="bg-white/20 p-3 rounded-xl">
                                <i class="fa-solid fa-dna text-3xl text-emerald-100"></i>
                            </div>
                            <div>
                                <h1 class="text-2xl font-extrabold tracking-tight">EduSel Kelas 8</h1>
                                <p class="text-xs text-emerald-100/90 font-medium mt-0.5">Aplikasi Belajar Sel & Mikroskop Mandiri Interaktif • Kurikulum Merdeka</p>
                            </div>
                        </div>
                        
                        {/* NAVBAR UTAMA */}
                        <nav class="flex flex-wrap gap-2 mt-4 md:mt-0 bg-emerald-800/60 p-1.5 rounded-xl border border-emerald-600/30">
                            <button onClick={() => setActiveTab("materi")} class={`px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 ${activeTab === 'materi' ? 'bg-white text-emerald-800 shadow-sm' : 'text-white hover:bg-emerald-600/40'}`}>
                                <i class="fa-solid fa-book-open mr-2"></i>Materi
                            </button>
                            <button onClick={() => setActiveTab("kisikisi")} class={`px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 ${activeTab === 'kisikisi' ? 'bg-white text-emerald-800 shadow-sm' : 'text-white hover:bg-emerald-600/40'}`}>
                                <i class="fa-solid fa-table-list mr-2"></i>Kisi-Kisi
                            </button>
                            <button onClick={() => setActiveTab("kuis")} class={`px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 ${activeTab === 'kuis' ? 'bg-white text-emerald-800 shadow-sm' : 'text-white hover:bg-emerald-600/40'}`}>
                                <i class="fa-solid fa-vial-circle-check mr-2"></i>Kuis Interaktif
                            </button>
                            <button onClick={() => setActiveTab("tanyaai")} class={`px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 ${activeTab === 'tanyaai' ? 'bg-white text-emerald-800 shadow-sm' : 'text-white hover:bg-emerald-600/40'}`}>
                                <i class="fa-solid fa-robot mr-2"></i>Tanya Guru AI
                            </button>
                        </nav>
                    </header>

                    {/* ============================ KONTEN TAB: MATERI ============================ */}
                    {activeTab === "materi" && (
                        <div class="space-y-6">
                            {/* Sub Navigasi Konten Materi */}
                            <div class="bg-white p-4 rounded-xl shadow-sm flex flex-wrap gap-3 items-center border border-slate-200">
                                <span class="text-xs font-bold uppercase tracking-wider text-slate-400 mr-2">Materi Pembelajaran Bab 1:</span>
                                <button onClick={() => setSubMateri("pengenalan-sel")} class={`flex items-center space-x-2 px-4 py-2 rounded-xl text-xs font-bold border transition-all ${subMateri === 'pengenalan-sel' ? 'bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                    <i class="fa-solid fa-circle-dot"></i> <span>Pengenalan Sel</span>
                                </button>
                                <button onClick={() => setSubMateri("alat-mikroskop")} class={`flex items-center space-x-2 px-4 py-2 rounded-xl text-xs font-bold border transition-all ${subMateri === 'alat-mikroskop' ? 'bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                    <i class="fa-solid fa-microscope"></i> <span>Alat Mikroskop</span>
                                </button>
                                <button onClick={() => setSubMateri("perbandingan-sel")} class={`flex items-center space-x-2 px-4 py-2 rounded-xl text-xs font-bold border transition-all ${subMateri === 'perbandingan-sel' ? 'bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>
                                    <i class="fa-solid fa-scale-balanced"></i> <span>Perbandingan Sel</span>
                                </button>
                            </div>

                            {/* Sub Materi 1: Pengenalan Sel */}
                            {subMateri === "pengenalan-sel" && (
                                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                                    <div>
                                        <span class="bg-amber-100 text-amber-800 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Materi Utama</span>
                                        <h2 class="text-xl font-bold mt-2">Pengenalan Sel</h2>
                                        <p class="text-xs text-slate-500 mt-0.5">Unit Terkecil Kehidupan</p>
                                    </div>
                                    <hr class="border-slate-100"/>
                                    <div class="space-y-4 text-sm leading-relaxed text-slate-600">
                                        <h3 class="font-bold text-slate-900 flex items-center"><span class="bg-emerald-100 text-emerald-700 w-5 h-5 inline-flex items-center justify-center rounded-full text-xs mr-2">1</span> Apa itu Sel?</h3>
                                        <p>Sel adalah unit struktural dan fungsional terkecil dari makhluk hidup. Istilah sel pertama kali ditemukan oleh Robert Hooke pada tahun 1665 saat mengamati sayatan gabus pohon ek di bawah mikroskop sederhana.</p>
                                        
                                        <h3 class="font-bold text-slate-900 flex items-center pt-2"><span class="bg-emerald-100 text-emerald-700 w-5 h-5 inline-flex items-center justify-center rounded-full text-xs mr-2">2</span> Spesialisasi Sel (Uniseluler vs Multiseluler)</h3>
                                        <ul class="list-disc list-inside space-y-1 pl-2">
                                            <li><strong class="text-slate-800">Uniseluler:</strong> Organisme yang hanya terdiri dari satu sel tunggal (Contoh: Bakteri, Amoeba, Paramecium).</li>
                                            <li><strong class="text-slate-800">Multiseluler:</strong> Organisme yang terdiri dari banyak sel yang bekerja sama (Contoh: Manusia, Hewan, Tumbuhan).</li>
                                        </ul>
                                    </div>
                                    <div class="bg-amber-50 p-4 rounded-xl border border-amber-200 flex items-start space-x-3">
                                        <i class="fa-solid fa-lightbulb text-amber-500 text-lg mt-0.5"></i>
                                        <div class="text-xs text-amber-900">
                                            <span class="font-bold">Tahukah Kamu?</span> Ukuran rata-rata sel makhluk hidup berkisar antara 10 hingga 100 mikrometer. Mutlak membutuhkan mikroskop untuk diamati.
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Sub Materi 2: Alat Mikroskop */}
                            {subMateri === "alat-mikroskop" && (
                                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                                    <div>
                                        <span class="bg-indigo-100 text-indigo-800 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Alat & Prosedur</span>
                                        <h2 class="text-xl font-bold mt-2">Mikroskop</h2>
                                        <p class="text-xs text-slate-500 mt-0.5">Melihat Dunia Mikro</p>
                                    </div>
                                    <hr class="border-slate-100"/>
                                    <div class="space-y-4 text-sm text-slate-600">
                                        <h3 class="font-bold text-slate-900">Bagian-Bagian Mikroskop</h3>
                                        <p>Secara umum, mikroskop memiliki dua bagian utama:</p>
                                        <div class="space-y-2 pl-2">
                                            <div><strong class="text-slate-800">• Bagian Optik:</strong> Lensa Okuler, Lensa Objektif, Kondensor, Diafragma, dan Cermin.</div>
                                            <div><strong class="text-slate-800">• Bagian Mekanik:</strong> Makrometer, Mikrometer, Revolver, Meja Preparat, dan Penjepit Objek.</div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Sub Materi 3: Perbandingan Sel */}
                            {subMateri === "perbandingan-sel" && (
                                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                                    <div>
                                        <span class="bg-orange-100 text-orange-800 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Perbandingan Struktur</span>
                                        <h2 class="text-xl font-bold mt-2">Sel Hewan vs Sel Tumbuhan</h2>
                                    </div>
                                    <hr class="border-slate-100"/>
                                    <div class="overflow-x-auto border border-slate-200 rounded-xl">
                                        <table class="w-full text-left border-collapse text-xs">
                                            <thead>
                                                <tr class="bg-slate-100 border-b border-slate-200 text-slate-700 font-bold">
                                                    <th class="p-3">Pembeda</th>
                                                    <th class="p-3 text-red-600">Sel Hewan</th>
                                                    <th class="p-3 text-emerald-600">Sel Tumbuhan</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-100 text-slate-600">
                                                <tr>
                                                    <td class="p-3 font-semibold text-slate-900">Dinding Sel</td>
                                                    <td class="p-3 text-red-500">Tidak Ada</td>
                                                    <td class="p-3 text-emerald-600">Ada (Kaku)</td>
                                                </tr>
                                                <tr>
                                                    <td class="p-3 font-semibold text-slate-900">Kloroplas</td>
                                                    <td class="p-3 text-red-500">Tidak Ada</td>
                                                    <td class="p-3 text-emerald-600">Ada</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* ============================ KONTEN TAB: KISI-KISI ============================ */}
                    {activeTab === "kisikisi" && (
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                            <h2 class="text-xl font-bold">Kisi-Kisi Soal Penilaian Harian</h2>
                            <div class="overflow-x-auto border border-slate-200 rounded-xl">
                                <table class="w-full text-left border-collapse text-xs custom-scrollbar">
                                    <thead>
                                        <tr class="bg-slate-100 border-b border-slate-200 text-slate-700 font-bold">
                                            <th class="p-3 w-12 text-center">No.</th>
                                            <th class="p-3">Materi</th>
                                            <th class="p-3">Indikator Soal</th>
                                            <th class="p-3 text-center">Level</th>
                                            <th class="p-3">Bentuk Soal</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100 text-slate-600">
                                        {KISI_KISI_DATA.map((row) => (
                                            <tr key={row.no}>
                                                <td class="p-3 text-center font-bold">{row.no}</td>
                                                <td class="p-3 font-semibold">{row.materi}</td>
                                                <td class="p-3">{row.indikator}</td>
                                                <td class="p-3 text-center"><span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">{row.level}</span></td>
                                                <td class="p-3">{row.bentuk}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* ============================ KONTEN TAB: KUIS INTERAKTIF ============================ */}
                    {activeTab === "kuis" && (
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            {!quizStarted ? (
                                <div class="text-center py-8 space-y-4 max-w-md mx-auto">
                                    <h2 class="text-xl font-bold text-slate-900">Kuis Evaluasi Bab 1</h2>
                                    <p class="text-xs text-slate-500">15 Soal latihan multi-variasi (Pilihan Ganda, Benar/Salah, Menjodohkan, Kompleks).</p>
                                    <button onClick={startQuiz} class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-xs transition-all">Mulai Kuis</button>
                                </div>
                            ) : (
                                <div class="space-y-6">
                                    <div class="flex items-center justify-between text-xs pb-3 border-b border-slate-100">
                                        <h3 class="font-bold text-sm">Soal {currentQuestionIndex + 1} dari {QUIZ_QUESTIONS.length}</h3>
                                        <span class="bg-slate-100 text-slate-700 px-3 py-1 rounded-full font-bold uppercase">{QUIZ_QUESTIONS[currentQuestionIndex].type}</span>
                                    </div>

                                    <div class="space-y-2">
                                        <h4 class="text-sm font-semibold text-slate-800">{QUIZ_QUESTIONS[currentQuestionIndex].question}</h4>
                                    </div>

                                    {/* Pilihan Jawaban */}
                                    <div class="pt-2">
                                        {(QUIZ_QUESTIONS[currentQuestionIndex].type === "pilihan-ganda" || QUIZ_QUESTIONS[currentQuestionIndex].type === "benar-salah") && (
                                            <div class="grid grid-cols-1 gap-2">
                                                {QUIZ_QUESTIONS[currentQuestionIndex].options.map((option) => {
                                                    const isSelected = selectedAnswers[QUIZ_QUESTIONS[currentQuestionIndex].id] === option;
                                                    return (
                                                        <button key={option} onClick={() => handleAnswerSelect(QUIZ_QUESTIONS[currentQuestionIndex].id, "single", option)} disabled={quizSubmitted}
                                                            class={`w-full text-left p-3.5 rounded-xl border text-xs transition-all ${isSelected ? 'bg-emerald-50 border-emerald-500 text-emerald-900 font-semibold' : 'bg-white border-slate-200'}`}>
                                                            {option}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        )}

                                        {QUIZ_QUESTIONS[currentQuestionIndex].type === "multi-select" && (
                                            <div class="grid grid-cols-1 gap-2">
                                                {QUIZ_QUESTIONS[currentQuestionIndex].options.map((option) => {
                                                    const currentAnswers = selectedAnswers[QUIZ_QUESTIONS[currentQuestionIndex].id] || [];
                                                    const isChecked = currentAnswers.includes(option);
                                                    return (
                                                        <button key={option} onClick={() => handleAnswerSelect(QUIZ_QUESTIONS[currentQuestionIndex].id, "multi-select", option)} disabled={quizSubmitted}
                                                            class={`w-full text-left p-3.5 rounded-xl border text-xs transition-all ${isChecked ? 'bg-emerald-50 border-emerald-500' : 'bg-white border-slate-200'}`}>
                                                            <input type="checkbox" checked={isChecked} readOnly class="mr-2"/> {option}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        )}

                                        {QUIZ_QUESTIONS[currentQuestionIndex].type === "matching" && (
                                            <div class="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                {QUIZ_QUESTIONS[currentQuestionIndex].pairs.map((pair) => {
                                                    const userSelection = (selectedAnswers[QUIZ_QUESTIONS[currentQuestionIndex].id] || {})[pair.key] || "";
                                                    return (
                                                        <div key={pair.key} class="bg-white p-3 rounded-lg border flex flex-col space-y-1">
                                                            <label class="text-xs font-bold">{pair.key}</label>
                                                            <select value={userSelection} onChange={(e) => handleAnswerSelect(QUIZ_QUESTIONS[currentQuestionIndex].id, "matching", { pairKey: pair.key, value: e.target.value })} disabled={quizSubmitted}
                                                                class="w-full text-xs p-2 rounded border bg-slate-50">
                                                                <option value="">-- Jodohkan --</option>
                                                                {pair.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                            </select>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>

                                    {quizSubmitted && (
                                        <div class="bg-slate-900 text-white p-4 rounded-xl text-center text-xs">
                                            <span class="text-slate-400">Nilai Akhir:</span> <strong class="text-emerald-400 text-lg">{score} / 100</strong>
                                        </div>
                                    )}

                                    {/* Navigasi Kuis */}
                                    <div class="flex items-center justify-between pt-4 border-t text-xs">
                                        <button onClick={() => setCurrentQuestionIndex(prev => Math.max(0, prev - 1))} disabled={currentQuestionIndex === 0} class="px-4 py-2 border rounded-lg disabled:opacity-40">Sebelumnya</button>
                                        {currentQuestionIndex < QUIZ_QUESTIONS.length - 1 ? (
                                            <button onClick={() => setCurrentQuestionIndex(prev => prev + 1)} class="px-4 py-2 bg-emerald-600 text-white rounded-lg">Berikutnya</button>
                                        ) : (
                                            !quizSubmitted && <button onClick={submitQuiz} class="px-5 py-2 bg-blue-600 text-white rounded-lg">Kirim Jawaban</button>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* ============================ KONTEN TAB: TANYA GURU AI ============================ */}
                    {activeTab === "tanyaai" && (
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[450px]">
                            <h2 class="text-xl font-bold">Tanya Guru IPA AI</h2>
                            <hr class="my-3"/>
                            <div class="flex-1 overflow-y-auto space-y-3 pr-1 custom-scrollbar text-xs">
                                {messages.map((msg) => (
                                    <div key={msg.id} class={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div class={`max-w-lg p-3 rounded-xl ${msg.sender === 'user' ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-800 border'}`}>
                                            <p>{msg.text}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <form onSubmit={handleSendChat} class="mt-3 flex items-center space-x-2 pt-2 border-t">
                                <input type="text" value={inputChat} onChange={(e) => setInputChat(e.target.value)} placeholder="Tanyakan materi sel..." class="flex-1 text-xs p-3 rounded-xl border bg-slate-50 focus:outline-none focus:bg-white"/>
                                <button type="submit" class="bg-emerald-600 text-white text-xs font-bold px-4 py-3 rounded-xl">Kirim</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        // Render Arsitektur React 17 Aman & Universal
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
